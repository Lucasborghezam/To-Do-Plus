<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>To Do Plus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="container_principal">
        <h1>To Do Plus</h1>

        <section id="area_input">
            <input type="text" id="input_tarefa" placeholder="Digite uma nova tarefa...">
            
            <select id="select_prioridade">
                <option value="baixa">Baixa</option>
                <option value="media">Média</option>
                <option value="alta">Alta</option>
            </select>

            <button id="btn_adicionar">Adicionar</button>
        </section>

        <ul id="lista_tarefas">
            </ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
